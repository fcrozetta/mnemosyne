services:
  arcadedb:
    image: arcadedata/arcadedb:latest
    environment:
      JAVA_OPTS: >-
        -Darcadedb.server.rootPassword=${ARCADE_PASSWORD:-mnemosyne-root}
    ports:
      - "${ARCADE_PORT:-2480}:2480"
    volumes:
      - arcadedb-data:/home/arcadedb/databases

  db-bootstrap:
    build: .
    depends_on:
      arcadedb:
        condition: service_started
    environment:
      ARCADE_URL: http://arcadedb:2480
      ARCADE_DATABASE: ${ARCADE_DATABASE:-mnemosyne}
      ARCADE_USERNAME: ${ARCADE_USERNAME:-root}
      ARCADE_PASSWORD: ${ARCADE_PASSWORD:-mnemosyne-root}
    command:
      - python
      - -c
      - |
        import os
        import time
        from app.storage.arcade import ArcadeStorageBackend

        backend = ArcadeStorageBackend(
            base_url=os.environ["ARCADE_URL"],
            database=os.environ["ARCADE_DATABASE"],
            username=os.environ["ARCADE_USERNAME"],
            password=os.environ["ARCADE_PASSWORD"],
        )
        for _ in range(60):
            if backend.ready():
                break
            time.sleep(1)
        else:
            raise SystemExit("ArcadeDB did not become ready.")
        backend.ensure_database()
        backend.apply_default_schema()
    volumes:
      - ./db:/app/db:ro

  api:
    build: .
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
    environment:
      MNEMOSYNE_STORAGE_BACKEND: arcade
      MNEMOSYNE_DOMAIN_POLICY_ENABLED: ${MNEMOSYNE_DOMAIN_POLICY_ENABLED:-${MNEMOSYNE_ACCESS_POLICY_ENABLED:-false}}
      MNEMOSYNE_ACCESS_POLICY_ENABLED: ${MNEMOSYNE_ACCESS_POLICY_ENABLED:-${MNEMOSYNE_DOMAIN_POLICY_ENABLED:-false}}
      MNEMOSYNE_ACCESS_CONTEXT_HEADERS_ENABLED: ${MNEMOSYNE_ACCESS_CONTEXT_HEADERS_ENABLED:-false}
      MNEMOSYNE_SAFE_PROJECTIONS_ENABLED: ${MNEMOSYNE_SAFE_PROJECTIONS_ENABLED:-false}
      MNEMOSYNE_ACCESS_AUDIT_ENABLED: ${MNEMOSYNE_ACCESS_AUDIT_ENABLED:-false}
      ARCADE_URL: http://arcadedb:2480
      ARCADE_DATABASE: ${ARCADE_DATABASE:-mnemosyne}
      ARCADE_USERNAME: ${ARCADE_USERNAME:-root}
      ARCADE_PASSWORD: ${ARCADE_PASSWORD:-mnemosyne-root}
    ports:
      - "${API_PORT:-8180}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  arcadedb-data:
